[pytest]
# Minimum required pytest version
minversion = 8.0

# Strict default command-line arguments:
# -ra: Show extra test summary info for everything except passed tests
# --strict-markers: Raise errors instead of warnings for unregistered markers
# --strict-config: Raise errors for configuration parsing issues
# --tb=short: Keep tracebacks clean and readable
addopts = -ra --strict-markers --strict-config --tb=short

# Directories to search for tests when none are specified
testpaths =
    tests

# Appends src/python to sys.path to resolve "from project_name import ..." absolute paths
pythonpath =
    .

# Regex patterns to discover test files, classes, and functions
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Explicitly register markers to maintain strict test categorization
markers =
    unit: Isolated unit tests
    integration: Integration tests involving external dependencies or filesystems
    slow: Tests that take a significant amount of time to execute

# Strict warning handling: Treat all warnings as errors (aligns with strict compiler philosophy)
filterwarnings =
    error
# Example exception: Ignore specific noisy third-party warnings if necessary
# ignore::DeprecationWarning:some_noisy_library.*
